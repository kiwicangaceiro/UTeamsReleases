name: APT repository

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: apt-repo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Download latest release debs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(gh release view --json tagName --jq .tagName)"
          mkdir -p debs
          gh release download "$tag" --pattern '*.deb' --dir debs
          ls -la debs

      - name: Import signing key
        run: |
          printf '%s' "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent || true
          keyid="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          echo "APT_KEY_ID=$keyid" >> "$GITHUB_ENV"

      - name: Build signed apt repository
        env:
          APT_LABEL: ${{ github.event.repository.name }}
        run: |
          chmod +x scripts/build-apt-repo.sh
          bash scripts/build-apt-repo.sh debs public/apt "$APT_KEY_ID"
          gpg --armor --export "$APT_KEY_ID" > public/apt/pubkey.gpg
          printf '<!doctype html><meta charset=utf-8><title>apt</title><p>Bentosoft apt repository. See <a href="apt/">apt/</a>.\n' > public/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
